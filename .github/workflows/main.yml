name: PS1 240p Test Suite Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This is the magic line. It pulls a full Linux environment 
    # that already has psx-gcc, mkisofs, and PS1 libraries installed.
    container:
      image: ghcr.io/lameguy64/psn00bsdk:latest 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Extra Host Dependencies
        run: |
          # The container is based on Arch Linux, so we use pacman
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel zip

      - name: Compile Custom Tools
        run: |
          cd tools
          make
          # Sometimes Linux makefiles don't output .exe extensions. 
          # We copy them to ensure the root Makefile finds what it's looking for.
          cp bmp2tim bmp2tim.exe || true
          cp bin2c bin2c.exe || true
          cp lz4compress lz4compress.exe || true
          cp wav2vag wav2vag.exe || true

      - name: Compile PS1 Project
        run: |
          # Run the main Makefile you provided
          make

      - name: Upload Standalone Executable and Disc Images
        uses: actions/upload-artifact@v4
        with:
          name: 240p-TestSuite-Builds
          path: |
            binary/*.exe
            binary/*.bin
            binary/*.cue
            binary/*.iso
          if-no-files-found: warn

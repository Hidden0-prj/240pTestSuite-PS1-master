name: PS1 240p Test Suite Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build PS1 Project in PSXSDK Container
        run: |
          docker run --rm -v "${{ github.workspace }}:/build" -w /build root670/docker-psxsdk sh -c '
            # 1. Install standard C compiler for the host tools (handling both Debian and Alpine bases)
            if ! command -v gcc &> /dev/null; then
              apk update && apk add build-base || (apt-get update && apt-get install -y build-essential)
            fi
            
            # 2. Bypass the broken Makefile and compile ONLY the exactly required tools directly
            echo "Compiling custom 240p host tools..."
            cd tools
            gcc bmp2tim.c -o bmp2tim.exe
            gcc bin2c.c -o bin2c.exe
            gcc wav2vag.c -o wav2vag.exe
            gcc lz4*.c -o lz4compress.exe
            
            # 3. Return to root and compile the PS1 project
            echo "Compiling PS1 Game..."
            cd ..
            make
          '

      - name: Upload Standalone Executable and Disc Images
        uses: actions/upload-artifact@v4
        with:
          name: 240p-TestSuite-Builds
          path: |
            binary/*.exe
            binary/*.bin
            binary/*.cue
            binary/*.hsf
            *.exe
            *.elf
          if-no-files-found: warn

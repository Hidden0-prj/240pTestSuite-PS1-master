name: PS1 240p Test Suite Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build PS1 Project in PSXSDK Container
        run: |
          # This command downloads the official PSXSDK Docker image, mounts your code, 
          # and runs a mini-script inside it to compile everything.
          docker run --rm -v "${{ github.workspace }}:/build" -w /build root670/docker-psxsdk sh -c '
            # 1. Install standard build tools needed to compile the "tools" folder
            apk update && apk add build-base
            
            # 2. Navigate to tools and compile them inside the container
            cd tools
            make
            
            # 3. Copy the compiled binaries to .exe extensions since the main Makefile expects them
            cp bmp2tim bmp2tim.exe || true
            cp bin2c bin2c.exe || true
            cp lz4compress lz4compress.exe || true
            cp wav2vag wav2vag.exe || true
            
            # 4. Return to root and compile the PS1 project using psx-gcc
            cd ..
            make
          '

      - name: Upload Standalone Executable and Disc Images
        uses: actions/upload-artifact@v4
        with:
          name: 240p-TestSuite-Builds
          path: |
            binary/*.exe
            binary/*.bin
            binary/*.cue
            binary/*.hsf
            *.exe
            *.elf
          if-no-files-found: warn
